<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Events - HSE Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class ="navbar">
        <h2>Petrofac HSE Tracker</h2>
        <div class="nav-links">
            <a href="/" class="active">Training Events</a>
            <a href="/registrations-page">Registrations</a>
        </div> 
    </div>

    <div class="container">
        <h3>Training Events</h3>

        <div class="form-box">

            <h3>Add New Event</h3>

            <input type="hidden" id="eventId" placeholder="e.g. Offshore Safety">

            <select id="eventCategory">
                <option value="">Select Category</option>
                <option>Safety</option>
                <option>Fire Safety</option>
                <option>Chemical</option>
            </select>

            <input type="date" id="date">
            <input type="text" id="location" placeholder="Event Location">
            <input type="number" id="capacity" placeholder="20">
            
            <button>Save Event</button>
            <button>Clear</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Capacity</th>
                    <th>Actions</th>
                </tr>
            </thead>
        
        <tbody>

        </tbody>
        </table>
    </div>
    
</body>
</html>
